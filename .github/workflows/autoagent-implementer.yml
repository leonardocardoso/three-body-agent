name: '[AUTOAGENT] Implementer'

on:
  # schedule:
  #   - cron: '0 * * * *'  # Every hour
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to implement'
        required: true
        type: string
      base_branch:
        description: 'Base branch (default: main, or a dependency branch)'
        required: false
        default: 'main'
        type: string
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-opus-4-6'
        type: choice
        options:
          - claude-opus-4-6
          - claude-sonnet-4-6

concurrency:
  group: autoagent-implementer
  cancel-in-progress: false

env:
  # TODO: Change these to your org and repo
  PROJECT_ORG: your-org
  REPO: your-org/your-repo
  # TODO: Change to your GitHub Projects V2 number
  PROJECT_NUMBER: 1
  # TODO: Change to your milestone format function, or remove milestone filtering
  # Current format: "YY CW WW" (e.g., "26 CW 14")

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      actions: read
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.resolve.outputs.skip }}
      issue_number: ${{ steps.resolve.outputs.issue_number }}
      issue_title: ${{ steps.resolve.outputs.issue_title }}
      base_branch: ${{ steps.resolve.outputs.base_branch }}
      model: ${{ steps.resolve.outputs.model }}
      start_message: ${{ steps.msg.outputs.start_message }}

    steps:
      - name: Resolve issue to implement
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
        run: |
          set -e

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch  - use provided inputs
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
            MODEL="${{ github.event.inputs.model }}"
            BASE="${{ github.event.inputs.base_branch }}"
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json title -q '.title' 2>/dev/null || echo "Unknown")

            echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
            echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
            echo "base_branch=$BASE" >> $GITHUB_OUTPUT
            echo "model=$MODEL" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Schedule  - scan project board for TODO issues
          # TODO: Adjust milestone filtering to your format, or remove if not using milestones
          YEAR=$(date -u +%y)
          THIS_WEEK_NUM=$((10#$(date -u +%V)))
          CURRENT_MILESTONE="${YEAR} CW ${THIS_WEEK_NUM}"
          echo "=== Scanning for TODO issues in milestone: ${CURRENT_MILESTONE} ==="

          # Paginate through ALL project board items (100 per page)
          TODO_FILE=$(mktemp)
          HAS_NEXT="true"
          CURSOR=""

          while [ "$HAS_NEXT" = "true" ]; do
            if [ -z "$CURSOR" ]; then
              CURSOR_ARG="null"
            else
              CURSOR_ARG="\"$CURSOR\""
            fi

            gh api graphql -f query='
              query {
                organization(login: "'"$PROJECT_ORG"'") {
                  projectV2(number: '"$PROJECT_NUMBER"') {
                    items(first: 100, after: '"$CURSOR_ARG"') {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                        content {
                          ... on Issue {
                            number
                            title
                            state
                            milestone {
                              title
                            }
                            labels(first: 20) {
                              nodes { name }
                            }
                            body
                          }
                        }
                      }
                    }
                  }
                }
              }
            ' > /tmp/page.json

            jq -r '
              .data.organization.projectV2.items.nodes[]
              | select(.fieldValueByName.name == "Todo")
              | select(.content.state == "OPEN")
              | select(.content.milestone.title == "'"$CURRENT_MILESTONE"'")
              | {
                  itemId: .id,
                  number: .content.number,
                  title: .content.title,
                  labels: [.content.labels.nodes[].name],
                  bodyLength: (.content.body | length)
                }
            ' /tmp/page.json >> "$TODO_FILE"

            HAS_NEXT=$(jq -r '.data.organization.projectV2.items.pageInfo.hasNextPage' /tmp/page.json)
            CURSOR=$(jq -r '.data.organization.projectV2.items.pageInfo.endCursor' /tmp/page.json)
          done

          TODO_ITEMS=$(cat "$TODO_FILE")
          rm -f "$TODO_FILE" /tmp/page.json

          if [ -z "$TODO_ITEMS" ]; then
            echo "No TODO issues found in milestone ${CURRENT_MILESTONE}. Standing by."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found TODO issues:"
          echo "$TODO_ITEMS" | jq -c '.'

          # Check for already running implementer workflows
          RUNNING=$(gh run list --workflow=autoagent-implementer.yml --status in_progress --json databaseId --jq 'length')
          if [ "$RUNNING" -gt 1 ]; then
            echo "Implementer already running. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Priority ranking: p0=0, p1=1, ..., p5=5, no priority=6
          BEST_ISSUE=$(echo "$TODO_ITEMS" | jq -s '
            sort_by(
              (if (.labels | index("p0")) then 0
               elif (.labels | index("p1")) then 1
               elif (.labels | index("p2")) then 2
               elif (.labels | index("p3")) then 3
               elif (.labels | index("p4")) then 4
               elif (.labels | index("p5")) then 5
               else 6 end),
              .bodyLength
            ) | .[0]
          ')

          ISSUE_NUM=$(echo "$BEST_ISSUE" | jq -r '.number')
          ISSUE_TITLE=$(echo "$BEST_ISSUE" | jq -r '.title')
          ITEM_ID=$(echo "$BEST_ISSUE" | jq -r '.itemId')

          if [ -z "$ISSUE_NUM" ] || [ "$ISSUE_NUM" = "null" ]; then
            echo "No suitable issue found."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Selected: #${ISSUE_NUM}  - ${ISSUE_TITLE}"

          # Check if issue already has an open PR
          EXISTING_PR=$(gh pr list --search "head:autoagent/${ISSUE_NUM}" --state open --json number --jq 'length')
          if [ "$EXISTING_PR" -gt 0 ]; then
            echo "Issue #${ISSUE_NUM} already has an open PR. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for dependency branches
          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body -q '.body')
          BASE_BRANCH="main"

          DEP_NUM=$(echo "$ISSUE_BODY" | sed -n 's/.*Depends on:*\s*#*\([0-9]\+\).*/\1/p' | head -1)
          if [ -n "$DEP_NUM" ]; then
            DEP_BRANCH=$(gh pr list --search "head:autoagent/${DEP_NUM}" --state open --json headRefName --jq '.[0].headRefName // empty')
            if [ -n "$DEP_BRANCH" ]; then
              BASE_BRANCH="$DEP_BRANCH"
              echo "Dependency detected: #${DEP_NUM} → base branch: ${BASE_BRANCH}"
            fi
          fi

          # Move to IN PROGRESS on the board
          PROJECT_ID=$(gh api graphql -f query='
            query {
              organization(login: "'"$PROJECT_ORG"'") {
                projectV2(number: '"$PROJECT_NUMBER"') { id }
              }
            }
          ' --jq '.data.organization.projectV2.id')

          STATUS_FIELD_ID=$(gh api graphql -f query="
            query {
              node(id: \"${PROJECT_ID}\") {
                ... on ProjectV2 {
                  field(name: \"Status\") {
                    ... on ProjectV2SingleSelectField {
                      id
                      options { id name }
                    }
                  }
                }
              }
            }
          " --jq '.data.node.field.id')

          IN_PROGRESS_ID=$(gh api graphql -f query="
            query {
              node(id: \"${PROJECT_ID}\") {
                ... on ProjectV2 {
                  field(name: \"Status\") {
                    ... on ProjectV2SingleSelectField {
                      options { id name }
                    }
                  }
                }
              }
            }
          " --jq '.data.node.field.options[] | select(.name == "In Progress") | .id')

          gh api graphql -f query="
            mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: \"${PROJECT_ID}\"
                itemId: \"${ITEM_ID}\"
                fieldId: \"${STATUS_FIELD_ID}\"
                value: { singleSelectOptionId: \"${IN_PROGRESS_ID}\" }
              }) {
                projectV2Item { id }
              }
            }
          "

          echo "Moved #${ISSUE_NUM} to IN PROGRESS"

          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT
          echo "model=claude-opus-4-6" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Build start message
        id: msg
        if: steps.resolve.outputs.skip != 'true'
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo 'start_message<<EOF'
            echo "🏗️ [AUTOAGENT] Implementer  - #${{ steps.resolve.outputs.issue_number }} ${{ steps.resolve.outputs.issue_title }}"
            echo "${RUN_URL}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  notify-start:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    uses: ./.github/workflows/telegram.yml
    with:
      message: ${{ needs.prepare.outputs.start_message }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  implement:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    timeout-minutes: 90
    outputs:
      after_message: ${{ steps.summary.outputs.after_message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.AGENT_PAT }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # TODO: Add your project's dependency installation step
      # - name: Install dependencies
      #   run: npm install

      - name: Fetch issue details
        run: |
          gh issue view "${{ needs.prepare.outputs.issue_number }}" --json title,body,labels > /tmp/issue.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Implement with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_NUM="${{ needs.prepare.outputs.issue_number }}"
          BASE="${{ needs.prepare.outputs.base_branch }}"
          ISSUE_BODY=$(jq -r '.body' /tmp/issue.json)
          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)

          export ISSUE_NUM ISSUE_TITLE ISSUE_BODY BASE
          git show origin/main:.github/prompts/implementer.md | envsubst '$ISSUE_NUM $ISSUE_TITLE $ISSUE_BODY $BASE' | \
            claude -p --verbose --output-format stream-json --model "${{ needs.prepare.outputs.model }}" --max-turns 500 \
              --permission-mode auto

      - name: Comment on success
        if: success()
        run: |
          PR_URL=$(gh pr list --search "${{ needs.prepare.outputs.issue_number }}" --json url -q '.[0].url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh issue comment "${{ needs.prepare.outputs.issue_number }}" \
              --body "Implementation complete. PR: ${PR_URL}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: failure()
        run: |
          gh issue comment "${{ needs.prepare.outputs.issue_number }}" \
            --body "Autoagent failed. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture summary
        id: summary
        if: always()
        run: |
          ISSUE_NUM="${{ needs.prepare.outputs.issue_number }}"
          ISSUE_TITLE="${{ needs.prepare.outputs.issue_title }}"
          STATUS="${{ job.status }}"

          PR_URL=$(gh pr list --search "head:autoagent/${ISSUE_NUM}" --state open --json url -q '.[0].url' 2>/dev/null || echo "")

          BRANCH=$(git branch --show-current 2>/dev/null || echo "unknown")
          COMMITS=$(git log --pretty="- %s" origin/${{ needs.prepare.outputs.base_branch }}..HEAD 2>/dev/null | head -20 || echo "- No commits")
          FILES_CHANGED=$(git diff --name-only origin/${{ needs.prepare.outputs.base_branch }}..HEAD 2>/dev/null | wc -l | tr -d ' ')

          # Job summary
          {
            echo "## [AUTOAGENT] Implementer"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Issue** | #${ISSUE_NUM} - ${ISSUE_TITLE} |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Model** | ${{ needs.prepare.outputs.model }} |"
            echo "| **Branch** | \`${BRANCH}\` |"
            echo "| **Base** | \`${{ needs.prepare.outputs.base_branch }}\` |"
            echo "| **Files changed** | ${FILES_CHANGED} |"
            if [ -n "$PR_URL" ]; then
              echo "| **PR** | ${PR_URL} |"
            fi
            echo ""
            echo "### Commits"
            echo "${COMMITS}"
          } >> "$GITHUB_STEP_SUMMARY"

          # Telegram message
          if [ "$STATUS" = "success" ] && [ -n "$PR_URL" ]; then
            {
              echo 'after_message<<EOF'
              echo "[AUTOAGENT] Implementer done - #${ISSUE_NUM} ${ISSUE_TITLE}"
              echo "PR: ${PR_URL}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "success" ]; then
            {
              echo 'after_message<<EOF'
              echo "[AUTOAGENT] Implementer done - #${ISSUE_NUM} ${ISSUE_TITLE}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            {
              echo 'after_message<<EOF'
              echo "[AUTOAGENT] Implementer failed - #${ISSUE_NUM} ${ISSUE_TITLE}"
              echo "${RUN_URL}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-done:
    needs: implement
    if: always() && needs.implement.outputs.after_message != ''
    uses: ./.github/workflows/telegram.yml
    with:
      message: ${{ needs.implement.outputs.after_message }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
